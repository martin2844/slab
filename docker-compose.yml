services:
  slab-api:
    image: martin2844/slab:latest
    build: .
    ports:
      - "${PORT:-6970}:6970"
    environment:
      - PORT=6970
      - TRACKER_API_KEY=${TRACKER_API_KEY:-dev-key-change-me}
      - TRACKER_DB_PATH=/data/slab.db
    volumes:
      - slab-data:/data
    restart: unless-stopped

  slab-mcp:
    image: martin2844/slab:latest
    command: ["npx", "tsx", "src/mcp/server.ts"]
    ports:
      - "${TRACKER_MCP_PORT:-6969}:6969"
    environment:
      - TRACKER_MCP_PORT=6969
      - TRACKER_MCP_MODE=http
      - TRACKER_API_KEY=${TRACKER_API_KEY:-dev-key-change-me}
      - TRACKER_DB_PATH=/data/slab.db
    volumes:
      - slab-data:/data
    restart: unless-stopped

volumes:
  slab-data:
